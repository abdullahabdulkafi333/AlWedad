<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معرض ال.جي - النظام المحاسبي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap');
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background: #f8fafc; 
            margin: 0; 
            color: #334155;
            font-size: 0.8rem; 
        }

        .table-container { 
            max-height: 75vh; 
            overflow-y: auto; 
            background: white; 
            border-radius: 12px; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border: 1px solid #e2e8f0;
            margin-bottom: 1rem;
        }

        table { width: 100%; border-collapse: separate; border-spacing: 0; }

        thead th { 
            position: sticky; top: 0; z-index: 20; 
            background-color: #3b82f6; color: white; 
            padding: 12px 8px; font-weight: 700;
            font-size: 0.85rem;
        }

        td { padding: 8px 4px; border-bottom: 1px solid #f1f5f9; text-align: center; }

        .search-wrapper { position: relative; width: 100%; }

        .input-glass {
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid #cbd5e1;
            color: #1e293b !important;
            border-radius: 6px;
            padding: 6px 10px;
            font-size: 0.8rem;
            width: 100%;
            font-weight: 600;
        }

        .suggestions-list {
            position: absolute;
            top: 100%; left: 0; right: 0;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 0 0 6px 6px;
            max-height: 150px;
            overflow-y: auto;
            z-index: 50;
            display: none;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            color: #000000 !important;
        }

        .suggestion-item {
            padding: 8px 10px;
            cursor: pointer;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.75rem;
            color: #000000 !important;
            text-align: right;
        }

        .suggestion-item:hover { background: #eff6ff; color: #2563eb !important; }

        .suggestion-item.active {
            background: #3b82f6 !important;
            color: white !important;
        }

        header { padding: 1rem !important; }

        .tab-button {
            transition: all 0.3s ease;
        }

        .tab-button.active {
            background: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        @media print {
            @page { size: A4; margin: 1cm; }
            header, .no-print, #loader, .suggestions-list { display: none !important; }
            .table-container { max-height: none !important; overflow: visible !important; border: none !important; box-shadow: none !important; margin-bottom: 0 !important; }
            table { width: 100%; border-collapse: collapse; }
            th { position: static !important; background-color: #eee !important; color: black !important; border: 1px solid #000 !important; }
            td { border: 1px solid #000 !important; color: black !important; }
            .print-hidden { display: none !important; }
            .tab-content.active { display: block !important; }
        }

        /* تنسيق خاص للقيم المحاسبية */
        .positive-value {
            color: #059669 !important;
            font-weight: 700;
        }
        
        .negative-value {
            color: #dc2626 !important;
            font-weight: 700;
        }
        
        /* أقسام ميزان المراجعة */
        .account-section {
            margin-bottom: 1.5rem;
        }
        
        .section-title {
            background: #1e40af;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        
        /* شارات القيم */
        .value-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            margin: 0 2px;
        }
        
        .badge-positive {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }
        
        .badge-negative {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }
        
        .badge-neutral {
            background: #f3f4f6;
            color: #4b5563;
            border: 1px solid #e5e7eb;
        }
        
        /* تنسيق العمود الأول */
        .account-name {
            text-align: right;
            font-weight: 600;
            color: #1e293b;
        }
        
        /* تنسيق الدائن والمدين */
        .credit-cell {
            color: #059669 !important;
            font-weight: 600;
        }
        
        .debit-cell {
            color: #dc2626 !important;
            font-weight: 600;
        }
        
        /* تنسيق جديد للترويسة */
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .title-section {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .tabs-section {
            display: flex;
            gap: 0.5rem;
            flex-grow: 1;
            justify-content: center;
        }
        
        .controls-section {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }
        
        /* صف الإجمالي */
        .total-row {
            background: linear-gradient(135deg, #f8fafc, #f1f5f9);
            font-weight: 700;
        }
        
        .total-row td {
            border-top: 2px solid #cbd5e1;
            border-bottom: 2px solid #cbd5e1;
        }
        
        /* كشف الأرصدة */
        .highlight-cell {
            background: rgba(245, 158, 11, 0.1);
            font-weight: 700;
        }
        
        /* إجماليات الأرصدة */
        .totals-container {
            background: white;
            padding: 0.75rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
            margin-bottom: 0.5rem;
        }

        .total-card {
            padding: 0.5rem;
            border-radius: 6px;
            text-align: center;
            font-weight: 700;
            font-size: 0.85rem;
        }

        .usd-total { background: #dbeafe; color: #1e40af; }
        .syp-total { background: #dcfce7; color: #166534; }
        
        /* تنسيق العملات */
        .currency-usd {
            color: #1d4ed8;
            font-weight: 600;
        }
        
        .currency-syp {
            color: #d97706;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div id="loader" class="fixed inset-0 bg-white/90 z-[100] flex flex-col items-center justify-center">
        <div class="animate-spin rounded-full h-10 w-10 border-4 border-blue-600 border-t-transparent"></div>
        <p class="mt-4 text-gray-600 text-sm">جاري تحميل البيانات المحاسبية...</p>
    </div>

    <header class="bg-blue-600 text-white shadow-lg mb-4 sticky top-0 z-30 no-print">
        <div class="container mx-auto">
            <div class="header-content mb-3">
                <div class="title-section">
                    <h1 class="text-xl font-bold">معرض ال.جي - النظام المحاسبي</h1>
                </div>
                
                <div class="tabs-section">
                    <button onclick="switchTab('trialBalance')" class="tab-button active bg-blue-500 hover:bg-blue-400 text-white px-3 py-1.5 rounded-lg text-xs font-bold flex items-center gap-1">
                        <i class="fas fa-balance-scale-left text-[10px]"></i> ميزان المراجعة
                    </button>
                    <button onclick="switchTab('balances')" class="tab-button bg-blue-500 hover:bg-blue-400 text-white px-3 py-1.5 rounded-lg text-xs font-bold flex items-center gap-1">
                        <i class="fas fa-file-invoice-dollar text-[10px]"></i> الأرصدة
                    </button>
                </div>
                
                <div class="controls-section">
                    <button onclick="window.print()" class="bg-green-600 hover:bg-green-500 px-2 py-1 rounded text-xs font-bold border border-green-500 flex items-center gap-1">
                        <i class="fas fa-print text-[10px]"></i> طباعة
                    </button>
                </div>
            </div>

            <!-- بحث ميزان المراجعة -->
            <div id="trialBalanceSearch" class="tab-content active">
                <div class="grid grid-cols-4 gap-3 pb-2">
                    <div class="search-wrapper">
                        <input type="text" id="searchTrialAccount" placeholder="🔍 ابحث باسم الحساب" class="input-glass search-input" autocomplete="off">
                        <div id="suggestTrialAccount" class="suggestions-list"></div>
                    </div>
                    <div class="search-wrapper">
                        <input type="text" id="searchTrialUSD" placeholder="💵 بحث بالقيمة الدولارية" class="input-glass search-input" autocomplete="off">
                    </div>
                    <div class="search-wrapper">
                        <input type="text" id="searchTrialSYP" placeholder="💰 بحث بالقيمة السورية" class="input-glass search-input" autocomplete="off">
                    </div>
                    <div class="search-wrapper">
                        <input type="text" id="searchTrialTotal" placeholder="📊 بحث بالإجمالي" class="input-glass search-input" autocomplete="off">
                    </div>
                </div>
            </div>

            <!-- بحث الأرصدة -->
            <div id="balancesSearch" class="tab-content">
                <div class="grid grid-cols-4 gap-3 pb-2">
                    <div class="search-wrapper">
                        <input type="text" id="searchBalancesAccount" placeholder="🔍 ابحث باسم الحساب" class="input-glass search-input" autocomplete="off">
                        <div id="suggestBalancesAccount" class="suggestions-list"></div>
                    </div>
                    <div class="col-span-3"></div>
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 pb-8">
        <!-- محتوى ميزان المراجعة -->
        <div id="trialBalanceTable" class="tab-content active">
            <div id="trialBalanceContent">
                <!-- سيتم تعبئة البيانات بواسطة JavaScript -->
            </div>
        </div>

        <!-- محتوى الأرصدة -->
        <div id="balancesTable" class="tab-content">
            <!-- إجماليات الأرصدة -->
            <div class="totals-container mb-3 no-print">
                <div class="grid grid-cols-2 gap-3">
                    <div class="total-card usd-total">
                        <div class="text-[11px] text-gray-600">إجمالي الرصيد $</div>
                        <div class="text-sm" id="balancesTotalUsd">0.00 $</div>
                    </div>
                    <div class="total-card syp-total">
                        <div class="text-[11px] text-gray-600">إجمالي الرصيد ل.س</div>
                        <div class="text-sm" id="balancesTotalSyp">0 ل.س</div>
                    </div>
                </div>
            </div>
            
            <div class="table-container">
                <div class="section-title">كشف الأرصدة التفصيلي</div>
                <table id="balancesTableContent">
                    <thead>
                        <tr>
                            <th class="account-name">الحساب</th>
                            <th>مبيعات $</th>
                            <th>مبيعات ل.س</th>
                            <th>مشتريات $</th>
                            <th>مشتريات ل.س</th>
                            <th>المدفوع $</th>
                            <th>المدفوع ل.س</th>
                            <th class="highlight-cell">الرصيد $</th>
                            <th class="highlight-cell">الرصيد ل.س</th>
                        </tr>
                    </thead>
                    <tbody id="balancesTableBody">
                        <!-- سيتم تعبئة البيانات بواسطة JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // بيانات ميزان المراجعة من الكود الأول
        const trialBalanceSections = [
            {
                title: "الصندوق",
                accounts: [
                    { name: "الصندوق", usd: "0.00", syp: "390" },
                    { name: "صندوق كاش", usd: "0.00", syp: "460" },
                    { name: "صندوق الافتراضية", usd: "0.00", syp: "0" },
                    { name: "المكتب", usd: "0.00", syp: "0" }
                ],
                total: { usd: "0.00", syp: "850" }
            },
            {
                title: "كاش",
                accounts: [
                    { name: "كاش", usd: "0.00", syp: "10,198" },
                    { name: "الافتراضية", usd: "0.00", syp: "0" },
                    { name: "شام كاش", usd: "0.00", syp: "0" },
                    { name: "الهرم", usd: "0.00", syp: "0" }
                ],
                total: { usd: "0.00", syp: "10,198" }
            },
            {
                title: "الارصدة",
                accounts: [
                    { name: "الارصدة", usd: "2,000.00", syp: "1,923" }
                ],
                total: { usd: "2,000.00", syp: "1,923" }
            },
            {
                title: "المحل",
                accounts: [
                    { name: "المحل", usd: "300.00", syp: "0" },
                    { name: "كاش", usd: "0.00", syp: "4,000-" },
                    { name: "الافتراضية", usd: "0.00", syp: "0" },
                    { name: "حسم المشتريات", usd: "0.00", syp: "0" },
                    { name: "ايرادات اخرى", usd: "0.00", syp: "0" }
                ],
                total: { usd: "300.00", syp: "4,000-" }
            },
            {
                title: "البيت",
                accounts: [
                    { name: "البيت", usd: "0.00", syp: "0" },
                    { name: "صدقة", usd: "7.80", syp: "0" },
                    { name: "رصيد", usd: "0.00", syp: "0" },
                    { name: "حسم المبيعات", usd: "0.00", syp: "0" },
                    { name: "مصاريف اخرى", usd: "0.00", syp: "0" }
                ],
                total: { usd: "7.80", syp: "0" }
            },
            {
                title: "عبدالله",
                accounts: [
                    { name: "عبدالله", usd: "205.00", syp: "0" }
                ],
                total: { usd: "87.20", syp: "4,000-" }
            },
            {
                title: "الايرادات والمصاريف",
                accounts: [
                    { name: "الايرادات", usd: "300.00", syp: "4,000-" },
                    { name: "المصاريف", usd: "7.80", syp: "0" }
                ],
                total: { usd: "292.20", syp: "4,000-" }
            },
            {
                title: "رأس المال",
                accounts: [
                    { name: "راس المال العامل", usd: "2,000.00", syp: "12,971" },
                    { name: "راس المال", usd: "2,000.00", syp: "0" },
                    { name: "الصافي", usd: "0.00", syp: "12,971" }
                ],
                total: { usd: "0.00", syp: "12,971" }
            }
        ];

        // بيانات الأرصدة من الكود الأول
        const balancesData = [
            { 
                account: "كاش", 
                sales_usd: "0.00", sales_syp: "0", 
                purchases_usd: "0.00", purchases_syp: "0", 
                paid_usd: "0.00", paid_syp: "-4,000", 
                balance_usd: "0.00", balance_syp: "-3,667" 
            },
            { 
                account: "الافتراضية", 
                sales_usd: "0.00", sales_syp: "0", 
                purchases_usd: "0.00", purchases_syp: "0", 
                paid_usd: "0.00", paid_syp: "0", 
                balance_usd: "0.00", balance_syp: "0" 
            },
            { 
                account: "الدينون", 
                sales_usd: "0.00", sales_syp: "0", 
                purchases_usd: "0.00", purchases_syp: "0", 
                paid_usd: "-2,000.00", paid_syp: "-5,590", 
                balance_usd: "2,000.00", balance_syp: "5,590" 
            },
            { 
                account: "الإجمالي", 
                sales_usd: "0.00", sales_syp: "0", 
                purchases_usd: "0.00", purchases_syp: "0", 
                paid_usd: "-2,000.00", paid_syp: "-9,590", 
                balance_usd: "2,000.00", balance_syp: "1,923" 
            }
        ];

        let currentTab = 'trialBalance';
        let currentFocusIndex = -1;
        let currentSuggestItems = [];

        // تحميل البيانات
        function loadData() {
            renderTrialBalance();
            renderBalances();
            setupDropdowns();
            
            // إخفاء الloader
            setTimeout(() => {
                document.getElementById('loader').classList.add('hidden');
            }, 300);
        }

        // عرض ميزان المراجعة
        function renderTrialBalance() {
            const container = document.getElementById('trialBalanceContent');
            const searchAccount = document.getElementById('searchTrialAccount').value.toLowerCase();
            const searchUSD = document.getElementById('searchTrialUSD').value.toLowerCase();
            const searchSYP = document.getElementById('searchTrialSYP').value.toLowerCase();
            const searchTotal = document.getElementById('searchTrialTotal').value.toLowerCase();
            
            container.innerHTML = '';
            
            let hasResults = false;
            
            trialBalanceSections.forEach((section, sectionIndex) => {
                const filteredAccounts = section.accounts.filter(account => {
                    const accountMatch = !searchAccount || account.name.toLowerCase().includes(searchAccount);
                    const usdMatch = !searchUSD || account.usd.toLowerCase().includes(searchUSD);
                    const sypMatch = !searchSYP || account.syp.toLowerCase().includes(searchSYP);
                    return accountMatch && usdMatch && sypMatch;
                });
                
                const totalMatch = !searchTotal || 
                    section.total.usd.toLowerCase().includes(searchTotal) || 
                    section.total.syp.toLowerCase().includes(searchTotal);
                
                if (filteredAccounts.length === 0 && !totalMatch) return;
                
                hasResults = true;
                
                const sectionDiv = document.createElement('div');
                sectionDiv.className = 'account-section';
                
                const titleDiv = document.createElement('div');
                titleDiv.className = 'section-title';
                titleDiv.innerHTML = `
                    <i class="fas fa-folder-open ml-2"></i>
                    ${section.title}
                `;
                sectionDiv.appendChild(titleDiv);
                
                const tableContainer = document.createElement('div');
                tableContainer.className = 'table-container';
                
                const table = document.createElement('table');
                table.innerHTML = `
                    <thead>
                        <tr>
                            <th class="account-name">الحساب</th>
                            <th>دولار ($)</th>
                            <th>ليرة سورية (ل.س)</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${filteredAccounts.map((account, index) => `
                            <tr>
                                <td class="account-name">
                                    <i class="fas fa-file-invoice-dollar text-blue-500 ml-2"></i>
                                    ${account.name}
                                </td>
                                <td class="${getValueClass(account.usd)}">${formatValueWithBadge(account.usd)}</td>
                                <td class="${getValueClass(account.syp)}">${formatValueWithBadge(account.syp)}</td>
                            </tr>
                        `).join('')}
                        <tr class="total-row">
                            <td class="account-name">
                                <i class="fas fa-calculator text-green-600 ml-2"></i>
                                <strong>الإجمالي</strong>
                            </td>
                            <td class="${getValueClass(section.total.usd)}">${formatValueWithBadge(section.total.usd, true)}</td>
                            <td class="${getValueClass(section.total.syp)}">${formatValueWithBadge(section.total.syp, true)}</td>
                        </tr>
                    </tbody>
                `;
                
                tableContainer.appendChild(table);
                sectionDiv.appendChild(tableContainer);
                
                container.appendChild(sectionDiv);
            });
            
            if (!hasResults) {
                container.innerHTML = `
                    <div class="text-center py-16 text-gray-500">
                        <div class="inline-block p-4 bg-blue-50 rounded-full mb-4">
                            <i class="fas fa-search text-3xl text-blue-400"></i>
                        </div>
                        <h3 class="font-bold text-lg mb-2 text-gray-700">لا توجد نتائج للبحث</h3>
                        <p class="text-sm text-gray-500">حاول استخدام كلمات بحث مختلفة</p>
                    </div>
                `;
            }
        }

        // عرض الأرصدة
        function renderBalances() {
            const tbody = document.getElementById('balancesTableBody');
            const searchAccount = document.getElementById('searchBalancesAccount').value.toLowerCase();
            
            tbody.innerHTML = '';
            
            const filteredData = balancesData.filter(row => {
                return !searchAccount || row.account.toLowerCase().includes(searchAccount);
            });
            
            let totalUsd = 0;
            let totalSyp = 0;
            
            filteredData.forEach((row, i) => {
                const isTotalRow = row.account === "الإجمالي";
                const rowClass = isTotalRow ? 'total-row' : '';
                
                const balanceUsd = parseFloat(row.balance_usd.replace(/[^\d.-]/g, '').replace(/,/g, '')) || 0;
                const balanceSyp = parseFloat(row.balance_syp.replace(/[^\d.-]/g, '').replace(/,/g, '')) || 0;
                
                if (!isTotalRow) {
                    totalUsd += balanceUsd;
                    totalSyp += balanceSyp;
                }
                
                const tr = document.createElement('tr');
                tr.className = rowClass;
                
                tr.innerHTML = `
                    <td class="account-name">
                        <i class="fas ${isTotalRow ? 'fa-total' : 'fa-user'} ${isTotalRow ? 'text-green-600' : 'text-blue-500'} ml-2"></i>
                        ${row.account}
                    </td>
                    <td>${formatValueWithBadge(row.sales_usd)}</td>
                    <td>${formatValueWithBadge(row.sales_syp)}</td>
                    <td>${formatValueWithBadge(row.purchases_usd)}</td>
                    <td>${formatValueWithBadge(row.purchases_syp)}</td>
                    <td class="${getValueClass(row.paid_usd)}">${formatValueWithBadge(row.paid_usd)}</td>
                    <td class="${getValueClass(row.paid_syp)}">${formatValueWithBadge(row.paid_syp)}</td>
                    <td class="highlight-cell ${getValueClass(row.balance_usd)}">${formatValueWithBadge(row.balance_usd, true)}</td>
                    <td class="highlight-cell ${getValueClass(row.balance_syp)}">${formatValueWithBadge(row.balance_syp, true)}</td>
                `;
                tbody.appendChild(tr);
            });
            
            // تحديث الإجماليات
            document.getElementById('balancesTotalUsd').textContent = `${totalUsd.toFixed(2)} $`;
            document.getElementById('balancesTotalSyp').textContent = `${Math.round(totalSyp).toLocaleString()} ل.س`;
        }

        // تنسيق القيمة مع شارة ملونة
        function formatValueWithBadge(value, isTotal = false) {
            if (!value || value === "0.00" || value === "0" || value === "0-") {
                return `<span class="value-badge badge-neutral">${value}</span>`;
            }
            
            const numValue = parseFloat(value.replace(/[^\d.-]/g, '').replace(/,/g, ''));
            let badgeClass;
            
            if (isTotal) {
                badgeClass = numValue > 0 ? 'badge-positive' : 
                            numValue < 0 ? 'badge-negative' : 'badge-neutral';
            } else {
                badgeClass = numValue > 0 ? 'badge-positive' : 
                            numValue < 0 ? 'badge-negative' : 'badge-neutral';
            }
            
            return `<span class="value-badge ${badgeClass}">${value}</span>`;
        }

        // تحديد لون القيمة
        function getValueClass(value) {
            if (!value) return '';
            const num = parseFloat(value.replace(/[^\d.-]/g, '').replace(/,/g, ''));
            if (value.includes('-')) return 'negative-value';
            return num > 0 ? 'positive-value' : '';
        }

        // إعداد القوائم المنسدلة
        function setupDropdowns() {
            const trialInput = document.getElementById('searchTrialAccount');
            const trialList = document.getElementById('suggestTrialAccount');
            
            const allAccounts = [];
            trialBalanceSections.forEach(section => {
                section.accounts.forEach(account => {
                    allAccounts.push(account.name);
                });
            });
            const uniqueAccounts = [...new Set(allAccounts)];
            
            setupSearchInput(trialInput, trialList, uniqueAccounts, renderTrialBalance);
            
            const balancesInput = document.getElementById('searchBalancesAccount');
            const balancesList = document.getElementById('suggestBalancesAccount');
            const balanceAccounts = balancesData.map(row => row.account);
            
            setupSearchInput(balancesInput, balancesList, balanceAccounts, renderBalances);
            
            // البحث الفوري
            document.querySelectorAll('.search-input').forEach(el => {
                el.addEventListener('input', debounce(() => {
                    if (currentTab === 'trialBalance') {
                        renderTrialBalance();
                    } else if (currentTab === 'balances') {
                        renderBalances();
                    }
                }, 300));
            });
        }

        function setupSearchInput(input, list, sourceArray, renderFunction) {
            input.onfocus = function() {
                hideAllSuggestLists();
                updateSuggestions(this.value, list, sourceArray, renderFunction);
            };
            
            input.oninput = function() {
                updateSuggestions(this.value, list, sourceArray, renderFunction);
            };
            
            input.onkeydown = function(e) {
                handleSearchNavigation(e, list, renderFunction);
            };
        }

        function updateSuggestions(value, listElement, sourceArray, renderFunction) {
            const val = value.toLowerCase();
            const filteredValues = sourceArray
                .filter(v => v && v.toLowerCase().includes(val))
                .slice(0, 12);

            listElement.innerHTML = '';
            currentSuggestItems = [];
            
            if (filteredValues.length > 0) {
                filteredValues.forEach(v => {
                    const div = document.createElement('div');
                    div.className = 'suggestion-item';
                    div.textContent = v;
                    div.onclick = () => {
                        input.value = v;
                        hideAllSuggestLists();
                        renderFunction();
                    };
                    listElement.appendChild(div);
                    currentSuggestItems.push(div);
                });
                listElement.style.display = 'block';
                currentFocusIndex = -1;
            } else {
                listElement.style.display = 'none';
            }
        }

        function handleSearchNavigation(e, list, renderFunction) {
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (currentSuggestItems.length > 0) {
                    currentFocusIndex = Math.min(currentFocusIndex + 1, currentSuggestItems.length - 1);
                    updateActiveItem();
                }
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (currentSuggestItems.length > 0) {
                    currentFocusIndex = Math.max(currentFocusIndex - 1, 0);
                    updateActiveItem();
                }
            } else if (e.key === 'Enter') {
                e.preventDefault();
                if (currentFocusIndex >= 0 && currentSuggestItems[currentFocusIndex]) {
                    currentSuggestItems[currentFocusIndex].click();
                } else {
                    renderFunction();
                }
            } else if (e.key === 'Escape') {
                hideAllSuggestLists();
            }
        }

        function updateActiveItem() {
            currentSuggestItems.forEach(item => {
                item.classList.remove('active');
            });
            
            if (currentFocusIndex >= 0 && currentSuggestItems[currentFocusIndex]) {
                currentSuggestItems[currentFocusIndex].classList.add('active');
                currentSuggestItems[currentFocusIndex].scrollIntoView({ block: 'nearest' });
            }
        }

        function hideAllSuggestLists() {
            document.querySelectorAll('.suggestions-list').forEach(l => {
                l.style.display = 'none';
            });
            currentFocusIndex = -1;
            currentSuggestItems = [];
        }

        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        // تبديل التبويبات
        function switchTab(tabName) {
            currentTab = tabName;
            
            // تحديث أزرار التبويبات
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            
            // تفعيل التبويب المختار
            document.getElementById(`${tabName}Table`).classList.add('active');
            document.querySelector(`[onclick="switchTab('${tabName}')"]`).classList.add('active');
            
            const tabs = {
                'trialBalance': 'trialBalanceSearch',
                'balances': 'balancesSearch'
            };
            
            document.getElementById(tabs[tabName]).classList.add('active');
            
            hideAllSuggestLists();
        }

        // التحميل الأولي
        window.onload = function() {
            loadData();
        };
        
        // النقر خارج قوائم البحث لإخفائها
        document.addEventListener('click', function(e) {
            if (!e.target.classList.contains('search-input') &&
                !e.target.classList.contains('suggestion-item')) {
                hideAllSuggestLists();
            }
        });
    </script>
</body>
</html>
