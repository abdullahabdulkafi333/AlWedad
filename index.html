<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accounting System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap');
        body { font-family: 'Cairo', sans-serif; background: #ffffff; margin: 0; color: #1e293b; font-size: 0.8rem; }
        .table-container { max-height: 75vh; overflow-y: auto; background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05); border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; position: relative; }
        thead th { position: sticky; top: 0; background: #f8fafc; z-index: 10; border-bottom: 2px solid #e2e8f0; padding: 10px 8px; font-weight: 700; color: #475569; text-align: center; }
        tbody td { padding: 8px; border-bottom: 1px solid #f1f5f9; text-align: center; }
        tr:hover { background-color: #f8fafc; }
        .total-row { background-color: #f1f5f9; font-weight: 800; border-top: 2px solid #cbd5e1; }
        .btn { padding: 6px 12px; border-radius: 6px; cursor: pointer; transition: all 0.2s; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; }
        .btn-primary { background: #2563eb; color: white; }
        .btn-primary:hover { background: #1d4ed8; }
        .tab-btn { padding: 8px 16px; cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.2s; font-weight: 600; color: #64748b; }
        .tab-btn.active { border-bottom-color: #2563eb; color: #2563eb; background: #eff6ff; }
        .card { background: white; border-radius: 12px; border: 1px solid #e2e8f0; padding: 1.5rem; margin-bottom: 1.5rem; }
        @media print { .no-print { display: none !important; } body { background: white; font-size: 10pt; } .table-container { max-height: none; overflow: visible; } }
    </style>
</head>
<body class="bg-gray-50">

    <nav class="bg-white shadow-sm border-b no-print">
        <div class="max-w-7-xl mx-auto px-4">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-8">
                    <h1 class="text-xl font-800 text-blue-600">النظام المحاسبي</h1>
                    <div class="flex gap-2">
                        <button onclick="switchMainTab('accounting')" id="tab-accounting" class="tab-btn active">المحاسبة</button>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <span id="syncStatus" class="text-xs text-gray-500">جاري التحميل...</span>
                    <button onclick="fetchAllData()" class="btn btn-primary text-xs">تحديث البيانات <i class="fas fa-sync"></i></button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7-xl mx-auto p-4 md:p-6">
        <div id="accounting-section">
            <div class="flex gap-2 mb-6 no-print border-b">
                <button onclick="switchSubTab('trialBalance')" id="subtab-trialBalance" class="tab-btn active">ميزان المراجعة</button>
                <button onclick="switchSubTab('statement')" id="subtab-statement" class="tab-btn">كشف حساب</button>
            </div>

            <div id="trialBalance-content" class="tab-content">
                <div class="card">
                    <div class="flex justify-between items-center mb-4 no-print">
                        <h2 class="text-lg font-700">ميزان المراجعة</h2>
                        <button onclick="window.print()" class="btn btn-primary"><i class="fas fa-print"></i> طباعة</button>
                    </div>
                    <div class="table-container">
                        <table id="trialBalanceTable">
                            <thead>
                                <tr>
                                    <th>اسم الحساب</th>
                                    <th>مدين (حركات)</th>
                                    <th>دائن (حركات)</th>
                                    <th>رصيد مدين</th>
                                    <th>رصيد دائن</th>
                                </tr>
                            </thead>
                            <tbody id="trialBalanceBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="statement-content" class="tab-content hidden">
                <div class="card">
                    <h2 class="text-lg font-700 mb-4">كشف حساب</h2>
                    <p class="text-gray-500 text-sm">اختر الحساب من ميزان المراجعة لعرض التفاصيل.</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        // URLs الجداول (استبدلها بالروابط الفعلية الخاصة بك)
        const SHEET_URLS = {
            main: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS-o6Gid6Yp73Lp_3O78p4Ym1O_eK2wVf_V2v-0Kz39n-6D012V3Ym6D-T_W-Q4U-N1K3F-8S1D_P/pub?output=csv'
        };

        let rawData = [];
        let accountsData = {};

        async function fetchAllData() {
            document.getElementById('syncStatus').innerText = 'جاري التحديث...';
            try {
                const response = await fetch(SHEET_URLS.main);
                const csvText = await response.text();
                const results = Papa.parse(csvText, { header: true, skipEmptyLines: true });
                rawData = results.data;
                processData();
                renderTrialBalance();
                document.getElementById('syncStatus').innerText = 'تم التحديث بنجاح';
            } catch (error) {
                console.error("Error fetching data:", error);
                document.getElementById('syncStatus').innerText = 'خطأ في التحميل';
            }
        }

        function processData() {
            accountsData = {};
            rawData.forEach(row => {
                const accName = row['الحساب'] || row['Account'];
                const debit = parseFloat(row['مدين'] || row['Debit'] || 0);
                const credit = parseFloat(row['دائن'] || row['Credit'] || 0);

                if (!accName) return;

                if (!accountsData[accName]) {
                    accountsData[accName] = { debit: 0, credit: 0 };
                }
                accountsData[accName].debit += debit;
                accountsData[accName].credit += credit;
            });
        }

        function renderTrialBalance() {
            const tbody = document.getElementById('trialBalanceBody');
            tbody.innerHTML = '';
            
            let totalDebitMovements = 0;
            let totalCreditMovements = 0;
            let totalDebitBalance = 0;
            let totalCreditBalance = 0;

            Object.keys(accountsData).forEach(acc => {
                const d = accountsData[acc].debit;
                const c = accountsData[acc].credit;
                const balance = d - c;
                
                const balDebit = balance > 0 ? balance : 0;
                const balCredit = balance < 0 ? Math.abs(balance) : 0;

                totalDebitMovements += d;
                totalCreditMovements += c;
                totalDebitBalance += balDebit;
                totalCreditBalance += balCredit;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="text-right font-600">${acc}</td>
                    <td>${d.toLocaleString()}</td>
                    <td>${c.toLocaleString()}</td>
                    <td class="text-blue-600 font-bold">${balDebit.toLocaleString()}</td>
                    <td class="text-red-600 font-bold">${balCredit.toLocaleString()}</td>
                `;
                tbody.appendChild(tr);
            });

            // صف الإجمالي (المعدل ليطابق طلبك - جمع الأرصدة)
            const totalTr = document.createElement('tr');
            totalTr.className = 'total-row';
            totalTr.innerHTML = `
                <td>الإجمالي</td>
                <td>${totalDebitMovements.toLocaleString()}</td>
                <td>${totalCreditMovements.toLocaleString()}</td>
                <td class="text-blue-700 underline">${totalDebitBalance.toLocaleString()}</td>
                <td class="text-red-700 underline">${totalCreditBalance.toLocaleString()}</td>
            `;
            tbody.appendChild(totalTr);
        }

        function switchMainTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
        }

        function switchSubTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('#accounting-section .tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tab + '-content').classList.remove('hidden');
            document.getElementById('subtab-' + tab).classList.add('active');
        }

        window.onload = fetchAllData;
        setInterval(fetchAllData, 300000); // تحديث كل 5 دقائق
    </script>
</body>
</html>
