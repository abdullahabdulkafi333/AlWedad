<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المحاسبة المباشر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI&family=Alexandria:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { 
            font-family: 'Alexandria', sans-serif; 
            background-color: #fcfcfc; 
            color: #334155;
        }
        .table-container {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
        }
        /* تنسيق الأقسام الكبرى مثل الملف تماماً */
        .section-header {
            background-color: #f8fafc;
            color: #0f172a;
            font-weight: 700;
            border-y: 2px solid #e2e8f0;
        }
        .data-row:hover {
            background-color: #f1f5f9;
        }
        .number-font {
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }
        /* أنيميشن بسيط عند تحديث البيانات */
        .update-flash {
            animation: flash 0.5s ease-out;
        }
        @keyframes flash {
            0% { background-color: #f0fdf4; }
            100% { background-color: transparent; }
        }
    </style>
</head>
<body class="p-4">

    <div class="max-w-[1400px] mx-auto">
        <div class="flex justify-between items-center mb-4 pb-4 border-b border-gray-100">
            <div class="flex items-center gap-2">
                <span class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></span>
                <h1 class="text-lg font-bold text-slate-800">ميزان المراجعة (بث مباشر)</h1>
            </div>
            <div class="text-sm text-slate-500" id="sync-info">
                جاري الاتصال بالسحابة...
            </div>
        </div>

        <div class="table-container shadow-sm overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-right border-collapse" id="balanceTable">
                    <thead>
                        <tr id="tHead" class="bg-slate-50 border-b border-slate-200 text-slate-600 text-xs">
                            </tr>
                    </thead>
                    <tbody id="tBody" class="text-sm">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS2QXsIxQchkIgs6bY9lHOXqyLUBklNAx8-R1ej04yTxAiBWCIhMxA4rHFxVmfOi1y2AzZPOmhvigpZ/pub?gid=0&single=true&output=csv';
        let lastRawData = "";

        async function streamData() {
            try {
                // استخدام متبوع زمني (timestamp) لمنع التخزين المؤقت تماماً
                const response = await fetch(`${CSV_URL}&nocache=${Date.now()}`);
                const csvText = await response.text();

                // التحديث فقط إذا تغيرت البيانات فعلياً لتجنب إزعاج العين
                if (csvText !== lastRawData) {
                    lastRawData = csvText;
                    renderData(csvText);
                }
                
                document.getElementById('sync-info').innerText = `آخر مزامنة: ${new Date().toLocaleTimeString('ar-SA')}`;
            } catch (e) {
                document.getElementById('sync-info').innerText = "خطأ في الاتصال.. يحاول مجدداً";
            }
        }

        function renderData(csvText) {
            const rows = csvText.split('\n').map(row => 
                row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim())
            );

            const head = document.getElementById('tHead');
            const body = document.getElementById('tBody');
            
            head.innerHTML = '';
            body.innerHTML = '';

            rows.forEach((row, idx) => {
                if (row.length < 2) return;

                const tr = document.createElement('tr');
                
                if (idx === 0) {
                    row.forEach(h => {
                        const th = document.createElement('th');
                        th.className = "px-4 py-3 font-semibold text-center border-x border-slate-100";
                        th.innerText = h;
                        head.appendChild(th);
                    });
                } else {
                    // فحص إذا كان السطر هو "رأس قسم" (اسم الحساب موجود والباقي أصفار أو فارغ)
                    const isSection = row.slice(1).every(cell => cell === "" || cell === "0" || cell === "0.00");
                    
                    if (isSection) {
                        tr.className = "section-header";
                        const td = document.createElement('td');
                        td.setAttribute('colspan', row.length);
                        td.className = "px-4 py-2 border-y border-slate-200 text-slate-900 font-bold bg-slate-50";
                        td.innerHTML = `<i class="fa-solid fa-caret-left ml-2 text-blue-500"></i>${row[0]}`;
                        tr.appendChild(td);
                    } else {
                        tr.className = "data-row border-b border-slate-100 transition-all update-flash";
                        row.forEach((cell, cellIdx) => {
                            const td = document.createElement('td');
                            td.className = "px-4 py-2 border-x border-slate-50";
                            
                            // تنسيق الأرقام
                            if (!isNaN(cell) && cell !== "" && cellIdx !== 0) {
                                td.className += " number-font text-center";
                                const val = parseFloat(cell);
                                td.innerText = val.toLocaleString('en-US', {minimumFractionDigits: 2});
                                if (val < 0) td.classList.add('text-red-600');
                                if (val > 0) td.classList.add('text-blue-700');
                            } else {
                                td.innerText = cell;
                                if(cellIdx === 0) td.className += " font-medium";
                            }
                            tr.appendChild(td);
                        });
                    }
                }
                body.appendChild(tr);
            });
        }

        // تحديث سريع جداً كل 2 ثانية
        streamData();
        setInterval(streamData, 2000);
    </script>
</body>
</html>
