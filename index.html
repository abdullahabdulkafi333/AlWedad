<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>النظام المحاسبي - معرض ال.جي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            background: #f8fafc; 
            margin: 0; 
            color: #334155;
            font-size: 0.8rem; 
        }

        .table-container { 
            background: white; 
            border-radius: 8px; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid #e2e8f0;
            margin-bottom: 1.5rem;
            overflow-x: auto;
        }

        table { width: 100%; border-collapse: collapse; }

        thead th { 
            background-color: #3b82f6; 
            color: white; 
            padding: 10px 8px; 
            font-weight: 700;
            font-size: 0.85rem;
            border: 1px solid #2563eb;
        }

        td { 
            padding: 8px 6px; 
            border: 1px solid #e5e7eb; 
            text-align: center;
            font-size: 0.8rem;
        }

        .section-title {
            background: linear-gradient(to right, #1e40af, #3b82f6);
            color: white;
            padding: 10px 15px;
            border-radius: 6px 6px 0 0;
            font-weight: 700;
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 0;
        }

        .account-section {
            margin-bottom: 2rem;
        }

        .account-section:last-child {
            margin-bottom: 1rem;
        }

        .total-row {
            background-color: #f3f4f6;
            font-weight: bold;
        }

        .total-row td {
            border-top: 2px solid #9ca3af;
            border-bottom: 2px solid #9ca3af;
        }

        .search-wrapper { position: relative; width: 100%; }

        .input-glass {
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid #cbd5e1;
            color: #1e293b !important;
            border-radius: 6px;
            padding: 6px 10px;
            font-size: 0.8rem;
            width: 100%;
            font-weight: 600;
        }

        .suggestions-list {
            position: absolute;
            top: 100%; left: 0; right: 0;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 0 0 6px 6px;
            max-height: 150px;
            overflow-y: auto;
            z-index: 50;
            display: none;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            color: #000000 !important;
        }

        .suggestion-item {
            padding: 8px 10px;
            cursor: pointer;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.75rem;
            color: #000000 !important;
            text-align: right;
        }

        .suggestion-item:hover { background: #eff6ff; color: #2563eb !important; }

        .suggestion-item.active {
            background: #3b82f6 !important;
            color: white !important;
        }

        header { padding: 1rem !important; }

        .tab-button {
            transition: all 0.3s ease;
        }

        .tab-button.active {
            background: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        @media print {
            @page { size: A4; margin: 0.5cm; }
            header, .no-print, #loader, #printOptions, .suggestions-list, .tab-buttons { display: none !important; }
            .table-container { 
                box-shadow: none !important; 
                border: 1px solid #000 !important;
                margin-bottom: 20px !important;
            }
            table { width: 100%; border-collapse: collapse; }
            th { background-color: #ddd !important; color: black !important; border: 1px solid #000 !important; }
            td { border: 1px solid #000 !important; color: black !important; }
            .section-title { background: #ccc !important; color: black !important; -webkit-print-color-adjust: exact; }
            .account-section { break-inside: avoid; }
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .title-section {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .tabs-section {
            display: flex;
            gap: 0.5rem;
            flex-grow: 1;
            justify-content: center;
        }
        
        .controls-section {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .print-settings-btn {
            position: relative;
        }

        .positive-value {
            color: #059669;
            font-weight: 600;
        }

        .negative-value {
            color: #dc2626;
            font-weight: 600;
        }

        #loader {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="loader" class="fixed inset-0 bg-white/95 z-[1000] flex flex-col items-center justify-center">
        <div class="animate-spin rounded-full h-12 w-12 border-4 border-blue-600 border-t-transparent"></div>
        <p class="mt-4 text-gray-700 text-sm font-bold">جاري تحميل البيانات المحاسبية...</p>
    </div>

    <header class="bg-gradient-to-r from-blue-800 to-blue-700 text-white shadow-lg mb-4 sticky top-0 z-30 no-print">
        <div class="container mx-auto">
            <div class="header-content mb-3">
                <div class="title-section">
                    <h1 class="text-xl font-bold">النظام المحاسبي - معرض ال.جي</h1>
                </div>
                
                <div class="tabs-section">
                    <button onclick="switchTab('trialBalance')" class="tab-button active bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2">
                        <i class="fas fa-balance-scale"></i> ميزان المراجعة
                    </button>
                    <button onclick="switchTab('balances')" class="tab-button bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2">
                        <i class="fas fa-file-invoice-dollar"></i> الأرصدة
                    </button>
                </div>
                
                <div class="controls-section">
                    <div class="print-settings-btn">
                        <button onclick="togglePrintSettings()" class="bg-blue-600 hover:bg-blue-500 px-3 py-2 rounded text-sm font-bold border border-blue-500 flex items-center gap-2">
                            <i class="fas fa-print"></i> خيارات الطباعة
                        </button>
                    </div>
                    <button onclick="window.print()" class="bg-green-600 hover:bg-green-500 px-3 py-2 rounded text-sm font-bold border border-green-500 flex items-center gap-2">
                        <i class="fas fa-print"></i> طباعة
                    </button>
                </div>
            </div>

            <!-- بحث ميزان المراجعة -->
            <div id="trialBalanceSearch" class="tab-content active">
                <div class="grid grid-cols-4 gap-3 pb-2">
                    <div class="search-wrapper">
                        <input type="text" id="searchTrialAccount" placeholder="اسم الحساب" class="input-glass trial-search-input" autocomplete="off">
                        <div id="suggestTrialAccount" class="suggestions-list"></div>
                    </div>
                    <div class="search-wrapper">
                        <input type="text" id="searchTrialUSD" placeholder="قيمة الدولار" class="input-glass trial-search-input" autocomplete="off">
                    </div>
                    <div class="search-wrapper">
                        <input type="text" id="searchTrialSYP" placeholder="قيمة السوري" class="input-glass trial-search-input" autocomplete="off">
                    </div>
                    <div class="search-wrapper">
                        <input type="text" id="searchTrialTotal" placeholder="الإجمالي" class="input-glass trial-search-input" autocomplete="off">
                    </div>
                </div>
            </div>

            <!-- بحث الأرصدة -->
            <div id="balancesSearch" class="tab-content">
                <div class="grid grid-cols-4 gap-3 pb-2">
                    <div class="search-wrapper">
                        <input type="text" id="searchBalancesAccount" placeholder="اسم الحساب" class="input-glass balances-search-input" autocomplete="off">
                        <div id="suggestBalancesAccount" class="suggestions-list"></div>
                    </div>
                    <div class="col-span-3"></div>
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4">
        <!-- تبويب ميزان المراجعة -->
        <div id="trialBalanceTable" class="tab-content active">
            <div id="trialBalanceContent">
                <!-- سيتم تعبئة البيانات بواسطة JavaScript -->
            </div>
        </div>

        <!-- تبويب الأرصدة -->
        <div id="balancesTable" class="tab-content">
            <div class="table-container">
                <table id="balancesTableContent">
                    <thead>
                        <tr>
                            <th>الحساب</th>
                            <th>مبيعات دولار</th>
                            <th>مبيعات سوري</th>
                            <th>مشتريات دولار</th>
                            <th>مشتريات سوري</th>
                            <th>المدفوع دولار</th>
                            <th>المدفوع سوري</th>
                            <th>الرصيد دولار</th>
                            <th>الرصيد سوري</th>
                        </tr>
                    </thead>
                    <tbody id="balancesTableBody">
                        <!-- سيتم تعبئة البيانات بواسطة JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // بيانات ميزان المراجعة من الـ PDF - بنفس التقسيم
        const trialBalanceSections = [
            {
                title: "الصندوق",
                accounts: [
                    { name: "الصندوق", usd: "0.00", syp: "390" },
                    { name: "صندوق كاش", usd: "0.00", syp: "460" },
                    { name: "صندوق الافتراضية", usd: "0.00", syp: "0" },
                    { name: "المكتب", usd: "0.00", syp: "0" }
                ],
                total: { usd: "0.00", syp: "850" }
            },
            {
                title: "كاش",
                accounts: [
                    { name: "كاش", usd: "0.00", syp: "10,198" },
                    { name: "الافتراضية", usd: "0.00", syp: "0" },
                    { name: "شام كاش", usd: "0.00", syp: "0" },
                    { name: "الهرم", usd: "0.00", syp: "0" }
                ],
                total: { usd: "0.00", syp: "10,198" }
            },
            {
                title: "الارصدة",
                accounts: [
                    { name: "الارصدة", usd: "2,000.00", syp: "1,923" }
                ],
                total: { usd: "2,000.00", syp: "1,923" }
            },
            {
                title: "المحل",
                accounts: [
                    { name: "المحل", usd: "300.00", syp: "0" },
                    { name: "كاش", usd: "0.00", syp: "4,000-" },
                    { name: "الافتراضية", usd: "0.00", syp: "0" },
                    { name: "حسم المشتريات", usd: "0.00", syp: "0" },
                    { name: "ايرادات اخرى", usd: "0.00", syp: "0" }
                ],
                total: { usd: "300.00", syp: "4,000-" }
            },
            {
                title: "البيت",
                accounts: [
                    { name: "البيت", usd: "0.00", syp: "0" },
                    { name: "صدقة", usd: "7.80", syp: "0" },
                    { name: "رصيد", usd: "0.00", syp: "0" },
                    { name: "حسم المبيعات", usd: "0.00", syp: "0" },
                    { name: "مصاريف اخرى", usd: "0.00", syp: "0" }
                ],
                total: { usd: "7.80", syp: "0" }
            },
            {
                title: "عبدالله",
                accounts: [
                    { name: "عبدالله", usd: "205.00", syp: "0" }
                ],
                total: { usd: "87.20", syp: "4,000-" }
            },
            {
                title: "الايرادات والمصاريف",
                accounts: [
                    { name: "الايرادات", usd: "300.00", syp: "4,000-" },
                    { name: "المصاريف", usd: "7.80", syp: "0" }
                ],
                total: { usd: "292.20", syp: "4,000-" }
            },
            {
                title: "رأس المال",
                accounts: [
                    { name: "راس المال العامل", usd: "2,000.00", syp: "12,971" },
                    { name: "راس المال", usd: "2,000.00", syp: "0" },
                    { name: "الصافي", usd: "0.00", syp: "12,971" }
                ],
                total: { usd: "0.00", syp: "12,971" }
            }
        ];

        // بيانات الأرصدة من الـ PDF
        const balancesData = [
            { 
                account: "كاش", 
                sales_usd: "0.00", sales_syp: "0", 
                purchases_usd: "0.00", purchases_syp: "0", 
                paid_usd: "0.00", paid_syp: "-4,000", 
                balance_usd: "0.00", balance_syp: "-3,667" 
            },
            { 
                account: "الافتراضية", 
                sales_usd: "0.00", sales_syp: "0", 
                purchases_usd: "0.00", purchases_syp: "0", 
                paid_usd: "0.00", paid_syp: "0", 
                balance_usd: "0.00", balance_syp: "0" 
            },
            { 
                account: "الدينون", 
                sales_usd: "0.00", sales_syp: "0", 
                purchases_usd: "0.00", purchases_syp: "0", 
                paid_usd: "-2,000.00", paid_syp: "-5,590", 
                balance_usd: "2,000.00", balance_syp: "5,590" 
            },
            { 
                account: "الإجمالي", 
                sales_usd: "0.00", sales_syp: "0", 
                purchases_usd: "0.00", purchases_syp: "0", 
                paid_usd: "-2,000.00", paid_syp: "-9,590", 
                balance_usd: "2,000.00", balance_syp: "1,923" 
            }
        ];

        let currentTab = 'trialBalance';
        let currentFocusIndex = -1;
        let currentSuggestItems = [];

        // تحميل البيانات
        function loadData() {
            renderTrialBalance();
            renderBalances();
            setupDropdowns();
            
            // إخفاء الloader بعد تأخير قصير
            setTimeout(() => {
                document.getElementById('loader').classList.add('hidden');
            }, 300);
        }

        // عرض ميزان المراجعة بنفس تنسيق الـ PDF
        function renderTrialBalance() {
            const container = document.getElementById('trialBalanceContent');
            const searchAccount = document.getElementById('searchTrialAccount').value.toLowerCase();
            const searchUSD = document.getElementById('searchTrialUSD').value.toLowerCase();
            const searchSYP = document.getElementById('searchTrialSYP').value.toLowerCase();
            const searchTotal = document.getElementById('searchTrialTotal').value.toLowerCase();
            
            container.innerHTML = '';
            
            trialBalanceSections.forEach((section, sectionIndex) => {
                // تصفية الحسابات داخل القسم
                const filteredAccounts = section.accounts.filter(account => {
                    const accountMatch = !searchAccount || account.name.toLowerCase().includes(searchAccount);
                    const usdMatch = !searchUSD || account.usd.toLowerCase().includes(searchUSD);
                    const sypMatch = !searchSYP || account.syp.toLowerCase().includes(searchSYP);
                    return accountMatch && usdMatch && sypMatch;
                });
                
                // التحقق من مطابقة الإجمالي
                const totalMatch = !searchTotal || 
                    section.total.usd.toLowerCase().includes(searchTotal) || 
                    section.total.syp.toLowerCase().includes(searchTotal);
                
                // إذا لم يكن هناك حسابات مطابقة ولا إجمالي مطابق، تخطي القسم
                if (filteredAccounts.length === 0 && !totalMatch) return;
                
                // إنشاء قسم
                const sectionDiv = document.createElement('div');
                sectionDiv.className = 'account-section';
                
                // إضافة العنوان
                const titleDiv = document.createElement('div');
                titleDiv.className = 'section-title';
                titleDiv.textContent = section.title;
                sectionDiv.appendChild(titleDiv);
                
                // إنشاء الجدول
                const table = document.createElement('table');
                table.innerHTML = `
                    <thead>
                        <tr>
                            <th>الحساب</th>
                            <th>دولار</th>
                            <th>سوري</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${filteredAccounts.map((account, index) => `
                            <tr>
                                <td class="text-right font-bold">${account.name}</td>
                                <td class="${getValueClass(account.usd)}">${account.usd}</td>
                                <td class="${getValueClass(account.syp)}">${account.syp}</td>
                            </tr>
                        `).join('')}
                        <tr class="total-row">
                            <td class="text-right font-bold">الإجمالي</td>
                            <td class="${getValueClass(section.total.usd)} font-bold">${section.total.usd}</td>
                            <td class="${getValueClass(section.total.syp)} font-bold">${section.total.syp}</td>
                        </tr>
                    </tbody>
                `;
                
                // إضافة الجدول داخل حاوية
                const tableContainer = document.createElement('div');
                tableContainer.className = 'table-container';
                tableContainer.appendChild(table);
                sectionDiv.appendChild(tableContainer);
                
                container.appendChild(sectionDiv);
            });
            
            // إذا لم توجد نتائج
            if (container.innerHTML === '') {
                container.innerHTML = `
                    <div class="text-center py-8 text-gray-500">
                        <i class="fas fa-search text-2xl mb-2 block"></i>
                        <p class="font-bold">لا توجد حسابات تطابق معايير البحث</p>
                    </div>
                `;
            }
        }

        // عرض الأرصدة
        function renderBalances() {
            const tbody = document.getElementById('balancesTableBody');
            const searchAccount = document.getElementById('searchBalancesAccount').value.toLowerCase();
            
            tbody.innerHTML = '';
            
            const filteredData = balancesData.filter(row => {
                return !searchAccount || row.account.toLowerCase().includes(searchAccount);
            });
            
            filteredData.forEach((row, i) => {
                const isTotalRow = row.account === "الإجمالي";
                const rowClass = isTotalRow ? 'total-row' : '';
                
                const tr = document.createElement('tr');
                tr.className = rowClass;
                tr.innerHTML = `
                    <td class="text-right font-bold">${row.account}</td>
                    <td>${row.sales_usd}</td>
                    <td>${row.sales_syp}</td>
                    <td>${row.purchases_usd}</td>
                    <td>${row.purchases_syp}</td>
                    <td class="${getValueClass(row.paid_usd)}">${row.paid_usd}</td>
                    <td class="${getValueClass(row.paid_syp)}">${row.paid_syp}</td>
                    <td class="${getValueClass(row.balance_usd)} font-bold">${row.balance_usd}</td>
                    <td class="${getValueClass(row.balance_syp)} font-bold">${row.balance_syp}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // تحديد لون القيمة بناءً على إشارتها
        function getValueClass(value) {
            if (!value) return '';
            if (value.toString().includes('-')) return 'negative-value';
            const num = parseFloat(value.replace(/[^\d.-]/g, '').replace(/,/g, ''));
            return num > 0 ? 'positive-value' : '';
        }

        // إعداد القوائم المنسدلة
        function setupDropdowns() {
            // ميزان المراجعة
            const trialInput = document.getElementById('searchTrialAccount');
            const trialList = document.getElementById('suggestTrialAccount');
            
            // جمع جميع أسماء الحسابات الفريدة
            const allAccounts = [];
            trialBalanceSections.forEach(section => {
                section.accounts.forEach(account => {
                    allAccounts.push(account.name);
                });
            });
            const uniqueAccounts = [...new Set(allAccounts)];
            
            trialInput.onfocus = function() {
                hideAllSuggestLists();
                updateList(this.value, trialList, uniqueAccounts, renderTrialBalance);
            };
            
            trialInput.oninput = function() {
                updateList(this.value, trialList, uniqueAccounts, renderTrialBalance);
            };
            
            // الأرصدة
            const balancesInput = document.getElementById('searchBalancesAccount');
            const balancesList = document.getElementById('suggestBalancesAccount');
            
            const balanceAccounts = balancesData.map(row => row.account);
            
            balancesInput.onfocus = function() {
                hideAllSuggestLists();
                updateList(this.value, balancesList, balanceAccounts, renderBalances);
            };
            
            balancesInput.oninput = function() {
                updateList(this.value, balancesList, balanceAccounts, renderBalances);
            };
            
            // دالة مشتركة لتحديث القائمة
            function updateList(value, listElement, sourceArray, renderFunction) {
                const val = value.toLowerCase();
                const filteredValues = sourceArray
                    .filter(v => v && v.toLowerCase().includes(val))
                    .slice(0, 15);

                listElement.innerHTML = '';
                currentSuggestItems = [];
                
                if (filteredValues.length > 0) {
                    filteredValues.forEach(v => {
                        const div = document.createElement('div');
                        div.className = 'suggestion-item';
                        div.textContent = v;
                        div.onclick = () => {
                            event.target.value = v;
                            hideAllSuggestLists();
                            renderFunction();
                        };
                        listElement.appendChild(div);
                        currentSuggestItems.push(div);
                    });
                    listElement.style.display = 'block';
                    currentFocusIndex = -1;
                } else {
                    listElement.style.display = 'none';
                    currentFocusIndex = -1;
                    currentSuggestItems = [];
                }
            }
            
            // إدارة الأزرار
            document.addEventListener('keydown', function(e) {
                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    if (currentSuggestItems.length > 0) {
                        currentFocusIndex = Math.min(currentFocusIndex + 1, currentSuggestItems.length - 1);
                        updateActiveItem();
                    }
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    if (currentSuggestItems.length > 0) {
                        currentFocusIndex = Math.max(currentFocusIndex - 1, 0);
                        updateActiveItem();
                    }
                } else if (e.key === 'Enter') {
                    e.preventDefault();
                    if (currentFocusIndex >= 0 && currentSuggestItems[currentFocusIndex]) {
                        currentSuggestItems[currentFocusIndex].click();
                    }
                } else if (e.key === 'Escape') {
                    hideAllSuggestLists();
                }
            });
        }

        function updateActiveItem() {
            currentSuggestItems.forEach(item => {
                item.classList.remove('active');
            });
            
            if (currentFocusIndex >= 0 && currentSuggestItems[currentFocusIndex]) {
                currentSuggestItems[currentFocusIndex].classList.add('active');
                currentSuggestItems[currentFocusIndex].scrollIntoView({ block: 'nearest' });
            }
        }

        function hideAllSuggestLists() {
            document.querySelectorAll('.suggestions-list').forEach(l => {
                l.style.display = 'none';
            });
            currentFocusIndex = -1;
            currentSuggestItems = [];
        }

        // تبديل التبويبات
        function switchTab(tabName) {
            currentTab = tabName;
            
            // تحديث أزرار التبويبات
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            
            // تفعيل التبويب المختار
            const tabs = {
                'trialBalance': ['trialBalanceSearch', 'trialBalanceTable'],
                'balances': ['balancesSearch', 'balancesTable']
            };
            
            tabs[tabName].forEach(id => {
                document.getElementById(id).classList.add('active');
            });
            
            document.querySelector(`[onclick="switchTab('${tabName}')"]`).classList.add('active');
            
            // إخفاء جميع القوائم المنسدلة
            hideAllSuggestLists();
        }

        // إضافة مستمعات الأحداث
        document.querySelectorAll('.trial-search-input').forEach(el => {
            el.addEventListener('input', function() {
                // إضافة تأخير للبحث لتحسين الأداء
                clearTimeout(this.searchTimeout);
                this.searchTimeout = setTimeout(() => {
                    renderTrialBalance();
                }, 300);
            });
        });
        
        document.getElementById('searchBalancesAccount').addEventListener('input', function() {
            clearTimeout(this.searchTimeout);
            this.searchTimeout = setTimeout(() => {
                renderBalances();
            }, 300);
        });

        // التحميل الأولي
        window.onload = () => { 
            loadData();
            
            // إضافة مستمع لحالة الطباعة
            window.matchMedia('print').addListener(function(mql) {
                if (mql.matches) {
                    // قبل الطباعة
                    document.querySelectorAll('.tab-content').forEach(tab => {
                        if (!tab.classList.contains('active')) {
                            tab.style.display = 'none';
                        }
                    });
                } else {
                    // بعد الطباعة
                    document.querySelectorAll('.tab-content').forEach(tab => {
                        tab.style.display = '';
                    });
                }
            });
        };
    </script>
</body>
</html>
