<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام عرض ميزان المراجعة الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #27ae60;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: var(--primary-color);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* رأس الصفحة */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--primary-color);
            color: white;
            padding: 20px 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .logo h1 { margin: 0; font-size: 24px; }
        .status { font-size: 14px; display: flex; align-items: center; }
        .dot {
            height: 10px; width: 10px; background-color: #2ecc71;
            border-radius: 50%; display: inline-block; margin-left: 8px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(46, 204, 113, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 204, 113, 0); }
        }

        /* جدول البيانات */
        .table-container {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            animation: fadeIn 1s ease;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: right;
        }

        th {
            background-color: #f8f9fa;
            color: var(--primary-color);
            padding: 15px;
            font-weight: 700;
            border-bottom: 2px solid var(--accent-color);
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
            transition: background 0.3s;
        }

        tr:hover td {
            background-color: #f1f7ff;
        }

        /* تنسيق الأرقام والمبالغ */
        .amount {
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            color: var(--success-color);
        }

        /* رسالة التحميل */
        #loader {
            text-align: center;
            padding: 50px;
            font-size: 20px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* استجابة للهواتف */
        @media (max-width: 768px) {
            header { flex-direction: column; text-align: center; gap: 10px; }
            .table-container { overflow-x: auto; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="logo">
                <h1><i class="fas fa-calculator"></i> ميزان المراجعة المحاسبي</h1>
            </div>
            <div class="status">
                <span id="last-update">جاري التحديث...</span>
                <span class="dot"></span>
            </div>
        </header>

        <div class="table-container">
            <div id="loader">
                <i class="fas fa-spinner fa-spin"></i> جاري جلب البيانات من Google Sheets...
            </div>
            <table id="balance-table" style="display: none;">
                <thead id="table-head"></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS2QXsIxQchkIgs6bY9lHOXqyLUBklNAx8-R1ej04yTxAiBWCIhMxA4rHFxVmfOi1y2AzZPOmhvigpZ/pub?gid=0&single=true&output=csv';

        async function fetchData() {
            try {
                const response = await fetch(sheetUrl);
                const data = await response.text();
                parseCSV(data);
                
                // تحديث وقت المزامنة
                const now = new Date();
                document.getElementById('last-update').innerText = 'تحديث مباشر: ' + now.toLocaleTimeString('ar-SA');
            } catch (error) {
                console.error('خطأ في جلب البيانات:', error);
                document.getElementById('loader').innerHTML = '<i class="fas fa-exclamation-triangle"></i> فشل الاتصال بالبيانات.';
            }
        }

        function parseCSV(csvText) {
            const rows = csvText.split('\n').map(row => row.split(','));
            const tableHead = document.getElementById('table-head');
            const tableBody = document.getElementById('table-body');
            const loader = document.getElementById('loader');
            const table = document.getElementById('balance-table');

            // تفريغ الجدول قبل التحديث
            tableHead.innerHTML = '';
            tableBody.innerHTML = '';

            rows.forEach((row, index) => {
                if (row.length < 2) return; // تخطي السطور الفارغة

                const tr = document.createElement('tr');
                
                row.forEach(cell => {
                    const el = index === 0 ? document.createElement('th') : document.createElement('td');
                    el.textContent = cell.replace(/"/g, ''); // إزالة علامات الاقتباس إن وجدت
                    
                    // تمييز الأرقام
                    if (index !== 0 && !isNaN(el.textContent) && el.textContent !== '') {
                        el.classList.add('amount');
                    }
                    
                    tr.appendChild(el);
                });

                if (index === 0) {
                    tableHead.appendChild(tr);
                } else {
                    tableBody.appendChild(tr);
                }
            });

            loader.style.display = 'none';
            table.style.display = 'table';
        }

        // التحديث التلقائي كل 30 ثانية
        fetchData(); 
        setInterval(fetchData, 30000); 
    </script>
</body>
</html>
