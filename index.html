<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المحاسبة - معرض ال.جي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap');
        body { font-family: 'Cairo', sans-serif; background: #f8fafc; color: #334155; font-size: 0.85rem; }
        .table-container { max-height: 70vh; overflow-y: auto; background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        th { position: sticky; top: 0; background: #f1f5f9; z-index: 10; shadow: 0 2px 2px -1px rgba(0,0,0,0.1); }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: none; justify-content: center; align-items: center; z-index: 9999; }
    </style>
</head>
<body class="bg-slate-50">

    <div id="loading" class="loading-overlay"><i class="fas fa-spinner fa-spin fa-3x text-blue-600"></i></div>

    <header class="bg-white border-b sticky top-0 z-50 p-4 shadow-sm">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-lg text-white"><i class="fas fa-calculator fa-lg"></i></div>
                <h1 class="text-xl font-bold text-slate-800">Accounting <span class="text-blue-600">المحاسبة</span></h1>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-left">
                    <p class="text-xs text-slate-500">آخر تحديث</p>
                    <p id="lastUpdate" class="font-semibold text-sm">-</p>
                </div>
                <button onclick="fetchAllData()" class="bg-blue-50 text-blue-600 p-2 rounded-full hover:bg-blue-100 transition-colors">
                    <i class="fas fa-sync-alt" id="refreshIcon"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4">
        <div class="flex gap-2 mb-6 bg-white p-1 rounded-xl shadow-sm border inline-flex">
            <button class="px-6 py-2 rounded-lg bg-blue-600 text-white font-bold transition-all">
                <i class="fas fa-file-invoice-dollar ml-2"></i>كشف الحساب
            </button>
        </div>

        <div class="bg-white p-4 rounded-xl shadow-sm border mb-6 grid grid-cols-1 md:grid-cols-4 gap-4">
            <div>
                <label class="block text-xs font-bold mb-1">الحساب</label>
                <input type="text" id="searchStatementAccount" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none statement-search-input" placeholder="اسم الحساب...">
            </div>
            <div>
                <label class="block text-xs font-bold mb-1">من تاريخ</label>
                <input type="date" id="searchStatementDateFrom" class="w-full p-2 border rounded-lg statement-search-input">
            </div>
            <div>
                <label class="block text-xs font-bold mb-1">إلى تاريخ</label>
                <input type="date" id="searchStatementDateTo" class="w-full p-2 border rounded-lg statement-search-input">
            </div>
            <div class="flex items-end">
                <button onclick="renderStatement()" class="w-full bg-slate-800 text-white p-2 rounded-lg hover:bg-slate-700 transition-colors">
                    <i class="fas fa-filter ml-2"></i>تطبيق الفلتر
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div class="bg-emerald-50 border border-emerald-100 p-4 rounded-xl">
                <p class="text-emerald-600 text-xs font-bold mb-1">إجمالي المدين</p>
                <p id="totalDebit" class="text-2xl font-black text-emerald-700">0</p>
            </div>
            <div class="bg-rose-50 border border-rose-100 p-4 rounded-xl">
                <p class="text-rose-600 text-xs font-bold mb-1">إجمالي الدائن</p>
                <p id="totalCredit" class="text-2xl font-black text-rose-700">0</p>
            </div>
            <div class="bg-blue-50 border border-blue-100 p-4 rounded-xl">
                <p class="text-blue-600 text-xs font-bold mb-1">الرصيد النهائي</p>
                <p id="finalBalance" class="text-2xl font-black text-blue-700">0</p>
            </div>
        </div>

        <div class="table-container border">
            <table class="w-full text-right border-collapse">
                <thead>
                    <tr class="text-slate-600 border-b">
                        <th class="p-3">التاريخ</th>
                        <th class="p-3">البيان</th>
                        <th class="p-3">مدين</th>
                        <th class="p-3">دائن</th>
                        <th class="p-3">الرصيد</th>
                    </tr>
                </thead>
                <tbody id="statementTableBody" class="divide-y">
                    </tbody>
            </table>
        </div>
    </main>

    <script>
        // روابط البيانات المحدثة
        const SHEET_URLS = {
            journal: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS2QXsIxQchkIgs6bY9lHOXqyLUBklNAx8-R1ej04yTxAiBWCIhMxA4rHFxVmfOi1y2AzZPOmhvigpZ/pub?gid=210521495&single=true&output=csv',
            sales: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS2QXsIxQchkIgs6bY9lHOXqyLUBklNAx8-R1ej04yTxAiBWCIhMxA4rHFxVmfOi1y2AzZPOmhvigpZ/pub?gid=1183647784&single=true&output=csv',
            purchases: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS2QXsIxQchkIgs6bY9lHOXqyLUBklNAx8-R1ej04yTxAiBWCIhMxA4rHFxVmfOi1y2AzZPOmhvigpZ/pub?gid=515286016&single=true&output=csv',
            accounts: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS2QXsIxQchkIgs6bY9lHOXqyLUBklNAx8-R1ej04yTxAiBWCIhMxA4rHFxVmfOi1y2AzZPOmhvigpZ/pub?gid=1244180750&single=true&output=csv'
        };

        let dataStore = { journal: [] };

        async function fetchAllData() {
            document.getElementById('loading').style.display = 'flex';
            document.getElementById('refreshIcon').classList.add('fa-spin');
            
            try {
                const response = await fetch(SHEET_URLS.journal);
                const csvText = await response.text();
                Papa.parse(csvText, {
                    header: true,
                    skipEmptyLines: true,
                    complete: (results) => {
                        dataStore.journal = results.data;
                        renderStatement();
                        document.getElementById('lastUpdate').innerText = new Date().toLocaleTimeString('ar-EG');
                    }
                });
            } catch (error) {
                console.error("خطأ في جلب البيانات:", error);
                alert("حدث خطأ أثناء تحميل البيانات");
            } finally {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('refreshIcon').classList.remove('fa-spin');
            }
        }

        function renderStatement() {
            const tbody = document.getElementById('statementTableBody');
            const accountFilter = document.getElementById('searchStatementAccount').value.toLowerCase();
            const dateFrom = document.getElementById('searchStatementDateFrom').value;
            const dateTo = document.getElementById('searchStatementDateTo').value;

            let filtered = dataStore.journal.filter(row => {
                const rowDate = row['التاريخ'] ? new Date(row['التاريخ']).toISOString().split('T')[0] : '';
                const matchesAccount = row['اسم الحساب']?.toLowerCase().includes(accountFilter);
                const matchesDateFrom = !dateFrom || rowDate >= dateFrom;
                const matchesDateTo = !dateTo || rowDate <= dateTo;
                return matchesAccount && matchesDateFrom && matchesDateTo;
            });

            let totalDebit = 0, totalCredit = 0, runningBalance = 0;
            tbody.innerHTML = '';

            filtered.forEach(row => {
                const debit = parseFloat(row['مدين'] || 0);
                const credit = parseFloat(row['دائن'] || 0);
                totalDebit += debit;
                totalCredit += credit;
                runningBalance = debit - credit + runningBalance; // حسب منطق المحاسبة المعتاد

                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="p-3 text-slate-500">${row['التاريخ'] || '-'}</td>
                        <td class="p-3 font-semibold">${row['البيان'] || '-'}</td>
                        <td class="p-3 text-emerald-600 font-bold">${debit.toLocaleString()}</td>
                        <td class="p-3 text-rose-600 font-bold">${credit.toLocaleString()}</td>
                        <td class="p-3 font-bold ${runningBalance >= 0 ? 'text-blue-600' : 'text-rose-700'}">
                            ${runningBalance.toLocaleString()}
                        </td>
                    </tr>
                `;
            });

            document.getElementById('totalDebit').innerText = totalDebit.toLocaleString();
            document.getElementById('totalCredit').innerText = totalCredit.toLocaleString();
            document.getElementById('finalBalance').innerText = (totalDebit - totalCredit).toLocaleString();
        }

        // التحميل الأولي
        window.onload = () => {
            fetchAllData();
            // تحديث تلقائي كل 5 دقائق
            setInterval(fetchAllData, 300000);
        };
    </script>
</body>
</html>
