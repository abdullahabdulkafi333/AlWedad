<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة ميزان المراجعة المباشرة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { 
            font-family: 'Alexandria', sans-serif; 
            background-color: #f8fafc; /* خلفية رمادية فاتحة جداً */
            color: #1e293b;
        }
        /* تنسيق القسم (الجدول الفرعي) */
        .section-row {
            background: linear-gradient(90deg, #e0f2fe 0%, #f1f5f9 100%);
            border-right: 5px solid #3b82f6; /* تحديد أزرق قوي */
            color: #0369a1;
            font-weight: 700;
        }
        .table-wrapper {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        th {
            background-color: #f1f5f9;
            color: #475569;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
        }
        .num-cell {
            font-family: sans-serif; /* لسهولة قراءة الأرقام */
            font-weight: 500;
        }
        /* وميض التحديث */
        .flash-update {
            animation: flash 0.8s ease-out;
        }
        @keyframes flash {
            0% { background-color: #dbeafe; }
            100% { background-color: transparent; }
        }
    </style>
</head>
<body class="p-6">

    <div class="max-w-[1500px] mx-auto">
        <div class="flex justify-between items-center mb-6 bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-blue-50 text-blue-600 rounded-lg">
                    <i class="fas fa-file-invoice-dollar text-xl"></i>
                </div>
                <h1 class="text-xl font-bold text-slate-800">ميزان المراجعة الذكي</h1>
            </div>
            <div class="flex items-center gap-4 text-sm">
                <div class="flex items-center gap-2">
                    <span class="relative flex h-3 w-3">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-3 w-3 bg-blue-500"></span>
                    </span>
                    <span id="sync-status" class="text-blue-600 font-medium text-xs">اتصال حي</span>
                </div>
                <div id="last-time" class="bg-slate-100 px-3 py-1 rounded text-slate-500">--:--:--</div>
            </div>
        </div>

        <div class="table-wrapper overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-right border-collapse" id="mainTable">
                    <thead>
                        <tr id="tableHead" class="border-b border-slate-200">
                            </tr>
                    </thead>
                    <tbody id="tableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS2QXsIxQchkIgs6bY9lHOXqyLUBklNAx8-R1ej04yTxAiBWCIhMxA4rHFxVmfOi1y2AzZPOmhvigpZ/pub?gid=0&single=true&output=csv';
        
        // قائمة الأقسام التي طلبتها
        const targetSections = ["الصناديق", "البنوك", "الارصدة", "الايرادات", "المصاريف", "المسحوبات", "قائمة الدخل", "راس المال"];
        let lastRaw = "";

        async function fetchLive() {
            try {
                const response = await fetch(`${CSV_URL}&v=${Date.now()}`);
                const data = await response.text();
                
                if (data !== lastRaw) {
                    lastRaw = data;
                    render(data);
                }
                document.getElementById('last-time').innerText = new Date().toLocaleTimeString('ar-SA');
            } catch (e) { console.error("Update Error"); }
        }

        function render(csv) {
            const rows = csv.split('\n').map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim()));
            const head = document.getElementById('tableHead');
            const body = document.getElementById('tableBody');

            head.innerHTML = '';
            body.innerHTML = '';

            rows.forEach((row, idx) => {
                if (row.length < 2) return;

                const tr = document.createElement('tr');
                
                // الرأس الأول (أسماء الأعمدة)
                if (idx === 0) {
                    row.forEach(h => {
                        const th = document.createElement('th');
                        th.className = "px-6 py-4 border-l border-slate-100";
                        th.innerText = h;
                        head.appendChild(th);
                    });
                    return;
                }

                // فحص إذا كان السطر هو أحد الأقسام المطلوبة
                const firstCell = row[0];
                const isSectionHeader = targetSections.some(s => firstCell.includes(s));

                if (isSectionHeader) {
                    tr.className = "section-row";
                    const td = document.createElement('td');
                    td.setAttribute('colspan', row.length);
                    td.className = "px-6 py-3 text-base border-b border-blue-100";
                    td.innerHTML = `<i class="fas fa-folder-open ml-2"></i> ${firstCell}`;
                    tr.appendChild(td);
                } else {
                    tr.className = "data-row border-b border-slate-50 hover:bg-blue-50/30 flash-update";
                    row.forEach((cell, i) => {
                        const td = document.createElement('td');
                        td.className = "px-6 py-3 border-l border-slate-50";
                        
                        if (!isNaN(cell) && cell !== "" && i !== 0) {
                            const val = parseFloat(cell);
                            td.className += " num-cell text-center";
                            td.innerText = val.toLocaleString(undefined, {minimumFractionDigits: 2});
                            td.style.color = val < 0 ? '#ef4444' : '#1e40af';
                        } else {
                            td.innerText = cell;
                            if(i === 0) td.className += " font-medium text-slate-700";
                        }
                        tr.appendChild(td);
                    });
                }
                body.appendChild(tr);
            });
        }

        // تحديث لحظي كل ثانية (أقصى سرعة ممكنة)
        fetchLive();
        setInterval(fetchLive, 1000);
    </script>
</body>
</html>
