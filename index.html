<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاشة العرض المحاسبية الفورية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: #0f172a; /* خلفية داكنة فخمة */
            color: #f8fafc;
        }
        .table-container {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
        }
        /* تنسيق قسم (العناوين داخل الجدول) */
        .category-header {
            background: linear-gradient(90deg, #1e40af 0%, #1e1b4b 100%);
            color: #ffffff;
            font-weight: 900;
            font-size: 1.1rem;
        }
        .data-row:hover {
            background-color: rgba(51, 65, 85, 0.5);
        }
        .amount-positive { color: #4ade80; font-family: sans-serif; }
        .amount-negative { color: #f87171; font-family: sans-serif; }
        
        /* تأثير النبض للتحديث الفوري */
        .live-tag {
            background: #dc2626;
            animation: blink 1s infinite;
        }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        
        /* إلغاء السكرول بار الممل */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-full mx-auto">
        <div class="flex justify-between items-center mb-8 bg-slate-800 p-5 rounded-2xl border-b-4 border-blue-600 shadow-2xl">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center shadow-lg shadow-blue-500/50">
                    <i class="fas fa-bolt text-xl text-white"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-black tracking-wide">ميزان المراجعة <span class="text-blue-400">LIVE</span></h1>
                    <p class="text-slate-400 text-xs uppercase tracking-widest">نظام المزامنة اللحظية الشامل</p>
                </div>
            </div>
            
            <div class="flex flex-col items-end">
                <div class="flex items-center gap-2 px-3 py-1 rounded-md bg-red-950 border border-red-500/30">
                    <span class="live-tag w-2 h-2 rounded-full"></span>
                    <span class="text-red-500 text-[10px] font-bold">بث مباشر للبيانات</span>
                </div>
                <div id="last-sync" class="text-slate-500 text-[11px] mt-2 font-mono">جاري الربط...</div>
            </div>
        </div>

        <div class="table-container overflow-hidden shadow-2xl">
            <div class="overflow-x-auto">
                <table class="w-full text-right border-collapse" id="accountingTable">
                    <thead>
                        <tr id="tableHead" class="bg-slate-900/50 border-b border-slate-700 text-blue-300">
                            </tr>
                    </thead>
                    <tbody id="tableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS2QXsIxQchkIgs6bY9lHOXqyLUBklNAx8-R1ej04yTxAiBWCIhMxA4rHFxVmfOi1y2AzZPOmhvigpZ/pub?gid=0&single=true&output=csv';

        async function streamData() {
            try {
                // استخدام timestamp لضمان جلب بيانات جديدة تماماً في كل ثانية
                const response = await fetch(`${SHEET_CSV_URL}&nocache=${new Date().getTime()}`);
                const rawData = await response.text();
                renderLiveTable(rawData);
                document.getElementById('last-sync').innerText = "آخر تحديث: " + new Date().toLocaleTimeString();
            } catch (err) {
                console.error("Connection Error:", err);
            }
        }

        function renderLiveTable(csvText) {
            const rows = csvText.split('\n').map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim()));
            const head = document.getElementById('tableHead');
            const body = document.getElementById('tableBody');

            if (rows.length === 0) return;

            // 1. معالجة الرأس (الأعمدة)
            if (head.children.length === 0) {
                rows[0].forEach(col => {
                    const th = document.createElement('th');
                    th.className = "px-6 py-4 text-sm font-bold border-b border-slate-700";
                    th.innerText = col;
                    head.appendChild(th);
                });
            }

            // 2. معالجة البيانات والأقسام
            let newBodyContent = '';
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (row.length < 2 || row.every(cell => cell === "")) continue;

                // فحص هل السطر يمثل "عنوان قسم"
                // المعيار: الخانات من الثانية إلى الأخيرة فارغة
                const isSectionHeader = row.slice(1).every(cell => cell === "" || cell === "0" || cell === "0.00");

                if (isSectionHeader) {
                    newBodyContent += `
                        <tr class="category-header">
                            <td colspan="${row.length}" class="px-6 py-3 shadow-inner">
                                <i class="fas fa-layer-group ml-2 text-blue-400"></i> ${row[0]}
                            </td>
                        </tr>`;
                } else {
                    let rowHtml = `<tr class="data-row border-b border-slate-800/50 transition-all">`;
                    row.forEach((cell, index) => {
                        let displayCell = cell;
                        let cellClass = "px-6 py-3 text-sm";
                        
                        if (index === 0) {
                            cellClass += " font-bold text-slate-200";
                        } else if (!isNaN(cell) && cell !== "") {
                            const num = parseFloat(cell);
                            cellClass += num >= 0 ? " amount-positive" : " amount-negative";
                            displayCell = num.toLocaleString(undefined, {minimumFractionDigits: 2});
                        }
                        
                        rowHtml += `<td class="${cellClass}">${displayCell}</td>`;
                    });
                    rowHtml += `</tr>`;
                    newBodyContent += rowHtml;
                }
            }
            
            // تحديث الـ DOM فقط إذا تغيرت البيانات (اختياري لتحسين الأداء)
            body.innerHTML = newBodyContent;
        }

        // التحديث كل ثانية واحدة (Live Stream)
        setInterval(streamData, 1000);
        streamData(); // تشغيل فوري عند الفتح
    </script>
</body>
</html>
