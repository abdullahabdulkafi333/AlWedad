<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المحاسبة - النسخة المحدثة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap');
        body { font-family: 'Cairo', sans-serif; background: #ffffff; margin: 0; color: #1e293b; font-size: 0.8rem; }
        .table-container { max-height: 75vh; overflow-y: auto; background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05); border: 1px solid #e2e8f0; margin-bottom: 1rem; }
        table { width: 100%; border-collapse: collapse; }
        thead th { position: sticky; top: 0; z-index: 20; background-color: #2563eb; color: white; padding: 10px 6px; font-weight: 700; font-size: 0.8rem; border-bottom: 2px solid #1d4ed8; }
        td { padding: 6px 4px; border-bottom: 1px solid #f1f5f9; font-size: 0.75rem; text-align: center !important; }
        tr:nth-child(even) { background-color: #f8fafc; }
        .sync-indicator { position: fixed; bottom: 20px; left: 20px; background: #10b981; color: white; padding: 6px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; display: none; z-index: 1000; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .main-tab-button.active { background: #2563eb; color: white; }
        .sub-tab-button.active { background: #3b82f6; color: white; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gray-50">

    <div id="loader" class="fixed inset-0 bg-white/90 z-[100] flex flex-col items-center justify-center">
        <div class="animate-spin rounded-full h-10 w-10 border-4 border-blue-600 border-t-transparent"></div>
        <p class="mt-4 text-gray-600 text-sm font-bold">جاري المزامنة التلقائية...</p>
    </div>

    <div id="syncIndicator" class="sync-indicator">
        <i class="fas fa-sync-alt fa-spin mr-2"></i> جاري تحديث البيانات...
    </div>

    <header class="shadow-sm mb-3 sticky top-0 z-30 bg-white border-b">
        <div class="container mx-auto px-4 flex justify-between items-center py-2">
            <h1 class="text-xl font-bold text-blue-700">النظام المحاسبي الذكي</h1>
            <div class="flex gap-2">
                <button onclick="switchMainTab('accounting')" id="btn-accounting" class="main-tab-button active px-4 py-2 rounded-lg text-xs font-bold border">Accounting</button>
                <button onclick="switchMainTab('acash')" id="btn-acash" class="main-tab-button px-4 py-2 rounded-lg text-xs font-bold border">A.Cash</button>
            </div>
            <button onclick="window.print()" class="bg-slate-800 text-white px-4 py-2 rounded-lg text-xs font-bold"><i class="fas fa-print ml-1"></i> طباعة</button>
        </div>
    </header>

    <main class="container mx-auto px-3">
        <div id="accountingContent" class="tab-content">
            <div class="flex gap-2 mb-4 justify-center py-2">
                <button onclick="switchSubTab('trialBalance')" id="btn-trialBalance" class="sub-tab-button active px-3 py-1 rounded border text-xs font-bold">ميزان المراجعة</button>
                <button onclick="switchSubTab('balances')" id="btn-balances" class="sub-tab-button px-3 py-1 rounded border text-xs font-bold">الأرصدة</button>
            </div>
            <div id="trialBalanceTable" class="sub-tab-content"><div class="table-container"><table><thead><tr><th>الحساب</th><th>مدين دولار</th><th>دائن دولار</th><th>رصيد دولار</th><th>مدين سوري</th><th>دائن سوري</th><th>رصيد سوري</th></tr></thead><tbody id="trialBody"></tbody></table></div></div>
            <div id="balancesTable" class="sub-tab-content hidden"><div class="table-container"><table><thead><tr><th>الحساب</th><th>المبيعات</th><th>الارباح</th><th>مدفوع سوري</th><th>مدفوع دولار</th><th>رصيد سوري</th><th>رصيد دولار</th></tr></thead><tbody id="balancesBody"></tbody></table></div></div>
        </div>

        <div id="acashContent" class="tab-content hidden">
            <div class="flex gap-2 mb-4 justify-center py-2">
                <button onclick="switchAcashTab('acashTrialBalance')" id="btn-acashTrialBalance" class="sub-tab-button active px-3 py-1 rounded border text-xs font-bold">ميزان المراجعة</button>
                <button onclick="switchAcashTab('acashBalances')" id="btn-acashBalances" class="sub-tab-button px-3 py-1 rounded border text-xs font-bold">الأرصدة</button>
            </div>
            <div id="acashTrialBalanceTable" class="acash-sub-content"><div class="table-container"><table><thead><tr><th>الحساب</th><th>دولار</th><th>سوري</th></tr></thead><tbody id="acashTrialBody"></tbody></table></div></div>
            <div id="acashBalancesTable" class="acash-sub-content hidden"><div class="table-container"><table><thead><tr><th>الحساب</th><th>المبيعات</th><th>الارباح</th><th>مدفوع سوري</th><th>مدفوع دولار</th><th>رصيد سوري</th><th>رصيد دولار</th></tr></thead><tbody id="acashBalancesBody"></tbody></table></div></div>
        </div>
    </main>

    <script>
        const URLS = {
            trial: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS2QXsIxQchkIgs6bY9lHOXqyLUBklNAx8-R1ej04yTxAiBWCIhMxA4rHFxVmfOi1y2AzZPOmhvigpZ/pub?gid=0&output=csv',
            bal: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS2QXsIxQchkIgs6bY9lHOXqyLUBklNAx8-R1ej04yTxAiBWCIhMxA4rHFxVmfOi1y2AzZPOmhvigpZ/pub?gid=1858356687&output=csv',
            acashTrial: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRg-nYGccEUM-Rp1ct50XZEsVoGpBPb2l1OnRXF3ib6-u1bmM12A-9DMZHXl9oVs-cf6VUsLUZ4dPDZ/pub?gid=0&output=csv',
            acashBal: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRg-nYGccEUM-Rp1ct50XZEsVoGpBPb2l1OnRXF3ib6-u1bmM12A-9DMZHXl9oVs-cf6VUsLUZ4dPDZ/pub?gid=1858356687&output=csv'
        };

        let currentMainTab = 'accounting';
        let currentSubTab = 'trialBalance';
        let currentAcashTab = 'acashTrialBalance';
        let isRefreshing = false;

        async function fetchAllData(silent = false) {
            if (isRefreshing) return;
            isRefreshing = true;
            if (silent) document.getElementById('syncIndicator').style.display = 'block';

            try {
                const t = Date.now();
                const [r1, r2, r3, r4] = await Promise.all([
                    fetch(`${URLS.trial}&t=${t}`).then(res => res.text()),
                    fetch(`${URLS.bal}&t=${t}`).then(res => res.text()),
                    fetch(`${URLS.acashTrial}&t=${t}`).then(res => res.text()),
                    fetch(`${URLS.acashBal}&t=${t}`).then(res => res.text())
                ]);

                render(r1, 'trialBody', 7);
                render(r2, 'balancesBody', 7);
                render(r3, 'acashTrialBody', 3);
                render(r4, 'acashBalancesBody', 7);

                document.getElementById('loader').classList.add('hidden');
            } catch (e) { console.error(e); }
            finally {
                isRefreshing = false;
                setTimeout(() => document.getElementById('syncIndicator').style.display = 'none', 1000);
            }
        }

        function render(csv, targetId, cols) {
            const data = Papa.parse(csv, {header: false, skipEmptyLines: true}).data;
            let html = '';
            data.forEach((row, i) => {
                if (i === 0 || !row[0]) return;
                html += '<tr>' + row.slice(0, cols).map(v => `<td>${v || '0'}</td>`).join('') + '</tr>';
            });
            document.getElementById(targetId).innerHTML = html;
        }

        function switchMainTab(tab) {
            currentMainTab = tab;
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(tab + 'Content').classList.remove('hidden');
            document.querySelectorAll('.main-tab-button').forEach(el => el.classList.remove('active'));
            document.getElementById('btn-' + tab).classList.add('active');
        }

        function switchSubTab(tab) {
            currentSubTab = tab;
            document.querySelectorAll('#accountingContent .sub-tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(tab + 'Table').classList.remove('hidden');
            document.querySelectorAll('#accountingContent .sub-tab-button').forEach(el => el.classList.remove('active'));
            document.getElementById('btn-' + tab).classList.add('active');
        }

        function switchAcashTab(tab) {
            currentAcashTab = tab;
            document.querySelectorAll('.acash-sub-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(tab + 'Table').classList.remove('hidden');
            document.querySelectorAll('#acashContent .sub-tab-button').forEach(el => el.classList.remove('active'));
            document.getElementById('btn-' + tab).classList.add('active');
        }

        window.onload = () => {
            fetchAllData();
            setInterval(() => fetchAllData(true), 5000); // مزامنة كل 5 ثواني
        };
    </script>
</body>
</html>
