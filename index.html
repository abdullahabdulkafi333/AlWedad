<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ميزان المراجعة - عرض مباشر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Alexandria', sans-serif; 
            background-color: #f8fafc; 
            padding: 10px;
            font-size: 11.5px; /* خط أصغر ليناسب الحجم الجديد */
            color: #334155;
        }
        .container-box {
            max-width: 700px; /* عرض مدمج مثل الورقة */
            margin: 0 auto;
        }
        .accounting-table {
            width: 100%;
            margin-bottom: 12px;
            background: white;
            border: 1px solid #cbd5e1;
        }
        .accounting-table th {
            background-color: #f1f5f9; /* أزرق رمادي فاتح */
            color: #1e293b;
            padding: 2px 6px; /* أسطر صغيرة جداً */
            border: 1px solid #cbd5e1;
            font-weight: 700;
            text-align: center;
        }
        .accounting-table td {
            padding: 2px 6px; /* أسطر صغيرة جداً */
            border: 1px solid #e2e8f0;
            vertical-align: middle;
        }
        .total-row {
            background-color: #f8fafc;
            font-weight: 700;
            border-top: 1.5px solid #64748b;
        }
        .num-font {
            font-family: 'Arial', sans-serif;
            direction: ltr;
            text-align: center;
            font-weight: 600;
        }
        .header-strip {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            border-bottom: 2px solid #3b82f6;
            padding-bottom: 5px;
        }
        .negative { color: #dc2626; } /* أحمر للقيم السالبة */
        .positive { color: #2563eb; } /* أزرق للقيم الموجبة */
    </style>
</head>
<body>

    <div class="container-box">
        <div class="header-strip">
            <h1 class="text-sm font-bold">ميزان المراجعة المباشر </h1>
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></span>
                <span id="clock" class="text-[10px] text-slate-500">--:--:--</span>
            </div>
        </div>

        <div id="data-render-area">
            </div>
    </div>

    <script>
        const GOOGLE_SHEET_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS2QXsIxQchkIgs6bY9lHOXqyLUBklNAx8-R1ej04yTxAiBWCIhMxA4rHFxVmfOi1y2AzZPOmhvigpZ/pub?gid=0&single=true&output=csv';

        async function syncData() {
            try {
                const response = await fetch(`${GOOGLE_SHEET_CSV}&ignoreCache=${Date.now()}`);
                const text = await response.text();
                processAndDisplay(text);
                document.getElementById('clock').innerText = 'تحديث: ' + new Date().toLocaleTimeString('ar-SA');
            } catch (err) {
                console.error("Connection failed");
            }
        }

        function processAndDisplay(csvText) {
            const rows = csvText.split('\n').map(line => 
                line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(cell => cell.replace(/"/g, '').trim())
            );

            const container = document.getElementById('data-render-area');
            container.innerHTML = '';
            let currentTable = null;
            let currentBody = null;

            rows.forEach((row) => {
                if (row.length < 2 || row.every(c => c === "")) return;

                // إذا وجدنا كلمة "الحساب" نفتح جدولاً جديداً 
                if (row.includes("الحساب")) {
                    currentTable = document.createElement('table');
                    currentTable.className = 'accounting-table';
                    
                    const head = document.createElement('thead');
                    const hRow = document.createElement('tr');
                    row.forEach(cell => {
                        const th = document.createElement('th');
                        th.innerText = cell;
                        hRow.appendChild(th);
                    });
                    head.appendChild(hRow);
                    currentTable.appendChild(head);
                    
                    currentBody = document.createElement('tbody');
                    currentTable.appendChild(currentBody);
                    container.appendChild(currentTable);
                } else if (currentBody) {
                    const tr = document.createElement('tr');
                    
                    // تمييز أسطر الإجماليات 
                    if (row.some(c => c.includes("الاجمالي") || c.includes("الصافي") || c.includes("الأجمالي"))) {
                        tr.className = 'total-row';
                    }

                    row.forEach((cell, idx) => {
                        const td = document.createElement('td');
                        if (idx !== 2) { // خانات الأرقام
                            td.className = 'num-font';
                            const numVal = cell.replace(/,/g, '');
                            if (!isNaN(numVal) && numVal !== "") {
                                if (parseFloat(numVal) < 0) td.classList.add('negative');
                                else if (parseFloat(numVal) > 0) td.classList.add('positive');
                            }
                        }
                        td.innerText = cell || "0.00";
                        tr.appendChild(td);
                    });
                    currentBody.appendChild(tr);
                }
            });
        }

        // تحديث لحظي كل ثانية واحدة
        syncData();
        setInterval(syncData, 1000);
    </script>
</body>
</html>
