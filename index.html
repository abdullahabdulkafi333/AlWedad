<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المحاسبة - تلقائي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap');
        body { font-family: 'Cairo', sans-serif; background: #ffffff; margin: 0; color: #1e293b; font-size: 0.8rem; }
        .table-container { max-height: 75vh; overflow-y: auto; background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05); border: 1px solid #e2e8f0; margin-bottom: 1rem; }
        table { width: 100%; border-collapse: collapse; }
        thead th { position: sticky; top: 0; z-index: 20; background-color: #2563eb; color: white; padding: 10px 6px; font-weight: 700; font-size: 0.8rem; border-bottom: 2px solid #1d4ed8; }
        td { padding: 6px 4px; border-bottom: 1px solid #f1f5f9; font-size: 0.75rem; text-align: center !important; }
        .sync-indicator { position: fixed; bottom: 20px; left: 20px; background: #10b981; color: white; padding: 6px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; display: none; z-index: 1000; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        header { padding: 0.75rem !important; background: #ffffff; border-bottom: 1px solid #e2e8f0; }
        .main-tab-button.active { background: #2563eb; color: white; }
        .sub-tab-button.active { background: #3b82f6; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        /* التنسيقات الخاصة بـ A.Cash */
        .acash-trial-balance-header { background: #9333ea; color: white; padding: 0.75rem; border-radius: 8px; margin-bottom: 1rem; text-align: center; }
        .acash-balances-header { background: #059669; color: white; padding: 0.75rem; border-radius: 8px; margin-bottom: 1rem; text-align: center; }
    </style>
</head>
<body class="bg-gray-50">

    <div id="loader" class="fixed inset-0 bg-white/90 z-[100] flex flex-col items-center justify-center">
        <div class="animate-spin rounded-full h-10 w-10 border-4 border-blue-600 border-t-transparent"></div>
        <p class="mt-4 text-gray-600 text-sm">جاري تشغيل النظام والمزامنة...</p>
    </div>

    <div id="syncIndicator" class="sync-indicator no-print">
        <i class="fas fa-sync-alt fa-spin mr-2"></i> جاري تحديث البيانات تلقائياً...
    </div>

    <header class="shadow-sm mb-3 sticky top-0 z-30 no-print">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-blue-700">نظام المحاسبة الذكي</h1>
            <div class="flex gap-2">
                <button onclick="switchMainTab('accounting')" id="btn-accounting" class="main-tab-button active px-4 py-2 rounded-lg text-xs font-bold border">Accounting</button>
                <button onclick="switchMainTab('acash')" id="btn-acash" class="main-tab-button px-4 py-2 rounded-lg text-xs font-bold border">A.Cash</button>
            </div>
            <button onclick="window.print()" class="bg-gray-800 text-white px-4 py-2 rounded-lg text-xs"><i class="fas fa-print"></i> طباعة</button>
        </div>
    </header>

    <main class="container mx-auto px-3">
        <div id="accountingContent" class="tab-content active">
             <div class="flex gap-2 mb-4 justify-center">
                <button onclick="switchSubTab('trialBalance')" class="sub-tab-button active px-3 py-1 rounded border text-xs">ميزان المراجعة</button>
                <button onclick="switchSubTab('balances')" class="sub-tab-button px-3 py-1 rounded border text-xs">الأرصدة</button>
            </div>
            <div id="trialBalanceTable" class="sub-tab-content active">
                <div class="acash-trial-balance-header"><h2>ميزان المراجعة - المحاسبة</h2><div id="accountingTime"></div></div>
                <div class="table-container"><table><thead><tr><th>الحساب</th><th>دولار</th><th>سوري</th></tr></thead><tbody id="trialBalanceTableBody"></tbody></table></div>
            </div>
        </div>

        <div id="acashContent" class="tab-content">
            <div class="flex gap-2 mb-4 justify-center">
                <button onclick="switchAcashTab('acashTrialBalance')" class="sub-tab-button active px-3 py-1 rounded border text-xs">ميزان المراجعة</button>
                <button onclick="switchAcashTab('acashBalances')" class="sub-tab-button px-3 py-1 rounded border text-xs">الأرصدة</button>
            </div>
            <div id="acashTrialBalanceTable" class="acash-sub-content active">
                <div class="acash-trial-balance-header"><h2>ميزان المراجعة - A.Cash</h2><div id="acashTrialTime"></div></div>
                <div class="table-container"><table><thead><tr><th>الحساب</th><th>دولار</th><th>سوري</th></tr></thead><tbody id="acashTrialBalanceTableBody"></tbody></table></div>
            </div>
            <div id="acashBalancesTable" class="acash-sub-content" style="display:none;">
                <div class="acash-balances-header"><h2>أرصدة A.Cash</h2><div id="acashBalTime"></div></div>
                <div class="table-container"><table><thead><tr><th>الحساب</th><th>المبيعات</th><th>الأرباح</th><th>مدفوع سوري</th><th>مدفوع دولار</th><th>رصيد سوري</th><th>رصيد دولار</th></tr></thead><tbody id="acashBalancesTableBody"></tbody></table></div>
            </div>
        </div>
    </main>

    <script>
        // الروابط
        const URLS = {
            trial: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS2QXsIxQchkIgs6bY9lHOXqyLUBklNAx8-R1ej04yTxAiBWCIhMxA4rHFxVmfOi1y2AzZPOmhvigpZ/pub?gid=0&output=csv',
            acashTrial: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRg-nYGccEUM-Rp1ct50XZEsVoGpBPb2l1OnRXF3ib6-u1bmM12A-9DMZHXl9oVs-cf6VUsLUZ4dPDZ/pub?gid=0&output=csv',
            acashBal: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRg-nYGccEUM-Rp1ct50XZEsVoGpBPb2l1OnRXF3ib6-u1bmM12A-9DMZHXl9oVs-cf6VUsLUZ4dPDZ/pub?gid=1858356687&output=csv'
        };

        let isFetching = false;

        async function updateData() {
            if (isFetching) return;
            isFetching = true;
            document.getElementById('syncIndicator').style.display = 'block';

            const t = Date.now();
            try {
                const [trialRes, acashTrialRes, acashBalRes] = await Promise.all([
                    fetch(`${URLS.trial}&t=${t}`).then(r => r.text()),
                    fetch(`${URLS.acashTrial}&t=${t}`).then(r => r.text()),
                    fetch(`${URLS.acashBal}&t=${t}`).then(r => r.text())
                ]);

                // معالجة ورسم البيانات
                renderTable('trialBalanceTableBody', trialRes, [0, 1, 2]);
                renderTable('acashTrialBalanceTableBody', acashTrialRes, [0, 1, 2]);
                renderTable('acashBalancesTableBody', acashBalRes, [0, 1, 2, 3, 4, 5, 6]);

                const timeStr = `آخر تحديث: ${new Date().toLocaleTimeString('ar-EG')}`;
                ['accountingTime', 'acashTrialTime', 'acashBalTime'].forEach(id => document.getElementById(id).innerText = timeStr);
                
                document.getElementById('loader').classList.add('hidden');
            } catch (e) { console.error("Sync Error", e); }
            
            isFetching = false;
            setTimeout(() => { document.getElementById('syncIndicator').style.display = 'none'; }, 1000);
        }

        function renderTable(targetId, csvData, colIndices) {
            const rows = Papa.parse(csvData, {header: false, skipEmptyLines: true}).data;
            let html = '';
            rows.forEach((row, i) => {
                if (i === 0 || !row[0]) return; // تخطي العناوين أو الصفوف الفارغة
                html += '<tr>' + colIndices.map(idx => `<td>${row[idx] || '0'}</td>`).join('') + '</tr>';
            });
            document.getElementById(targetId).innerHTML = html;
        }

        // التبديل بين التبويبات
        function switchMainTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.main-tab-button').forEach(el => el.classList.remove('active'));
            document.getElementById(tab + 'Content').classList.add('active');
            document.getElementById('btn-' + tab).classList.add('active');
        }

        function switchAcashTab(tab) {
            document.querySelectorAll('.acash-sub-content').forEach(el => el.style.display = 'none');
            document.getElementById(tab + 'Table').style.display = 'block';
        }

        // التشغيل والمزامنة التلقائية كل 5 ثوانٍ
        window.onload = () => {
            updateData(); 
            setInterval(updateData, 5000); // تحديث كل 5000 ميلي ثانية (5 ثوانٍ)
        };
    </script>
</body>
</html>
